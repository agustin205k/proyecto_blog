<!--  
Estructura general del sitio:

Navbar: El navbar deberá cumplir con los siguientes requerimientos:
● Estar fijo en la parte superior de la web
● Agregar un botón de login el cual me llevará a la página de login.
● Agregar un botón de suscripción el cual abrirá una ventana modal con un
formulario, que solicitará los datos para suscribirme a este blog y recibir
notificaciones por email.
● Agregar un botón de contacto.
● Agregar un botón acerca de nosotros.

Footer: El footer debe contar con al menos tres columnas, las cuales tendrán el logo del
sitio, las redes sociales y la columna restante tendrá información optativa, el orden de las
columnas también es a elección de cada grupo. El comportamiento de las columnas deberá
ser el siguiente:
● Cuandoel dispositivo sea pequeño mostrar una columna.
● Cuando el dispositivo sea mediano mostrar dos o las tres columnas
(optativo).
● Cuandoel dispositivo sea grande mostrar las tres columnas.

Principal: Debe contener un slider que ocupe el ancho de la pantalla, luego el resto de la
web estará dividido en dos columnas:

primera columna agregar los siguientes elementos:
● La primer columna mostrará información de al menos, las últimas tres entradas del
blog. Cada entrada contendrá una imagen, un título principal, una descripción y un
botón “ver mas” que me llevará a otra página con el detalle de esta entrada. Debajo
de las entradas, deberá tener un grupo de botones de paginación.

En la segunda columna agregar los siguientes elementos:
○ Un pequeño formulario de búsqueda, para encontrar diferentes artículos
publicados.
○ Una lista de categorías de las entradas del blog.
○ Un área de publicidad, la cual deberá desaparecer cuando visualice la página
en el tamaño de un celular.
NOTA: En los dispositivos medianos y grandes la distribución de las columnas debe ser
como las mencionadas arriba, en un dispositivo pequeño, solo tendremos una columna, por
lo tanto el diseño de la segunda columna debe aparecer debajo.
-->


<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Rock Ritual - Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="./styles/index.css">
</head>
<body>
  <div class="root">
    <header class="root__header">
      <nav class="root__header__nav">
        <!-- Code Here Navbar -->
        <!-- Navbar is the same in all pages -->

        <div class="root__header__nav__logo">

          <div class="">
            
            <!-- offcanvas bootstrap -->
            <button class="" type="button" data-bs-toggle="offcanvas" data-bs-target="#staticBackdrop" aria-controls="staticBackdrop">
              <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="bi bi-list" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5"/>
              </svg>
            </button>

            <!-- offcanvas bootstrap -->
            <div class="offcanvas offcanvas-start" data-bs-backdrop="static" tabindex="-1" id="staticBackdrop" aria-labelledby="staticBackdropLabel">
              <div class="offcanvas-header">
                <h5 class="offcanvas-title" id="staticBackdropLabel">Search</h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
              </div>
              <div class="offcanvas-body">
                <div>
                  <ul>
                    <li><a href="./index.html">Home</a></li>
                    <li><a href="./login.html">Login</a></li>
                    <li><a href="./contact.html">Contact</a></li>
                    <li><a href="./about_us.html">About Us</a></li>
                  </ul>        
                </div>
              </div>
            </div>

            <h1>
              <span>The Rock</span>
              <span>Ritual</span>
            </h1>
          </div>
          <div class="">
            <img id="blog-logo" src="./assets/images/blog-logo.png" alt="">
          </div>
        </div>

        <div class="root__header__nav__menu">
          
          <!-- Button trigger modal -->
          <button type="button" data-bs-toggle="modal" data-bs-target="#exampleModal">
            Subscribe
          </button>
          <ul>
            <li><a href="./index.html">Home</a></li>
            <li><a href="./login.html">Login</a></li>
            <li><a href="./contact.html">Contact</a></li>
            <li><a href="./about_us.html">About Us</a></li>
          </ul>

          <!-- Modal -->
          <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog">
              <div class="modal-content">
                <div class="modal-header">
                  <h2 class="modal-title fs-5" id="exampleModalLabel">Subscribe Now, and see the latest news!</h2>
                  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                  <form class="subscription__form" action="#" id="subscription-form">
                    <div class="subscription__info">
                      <div class="subscription__group">
                        <label for="subscription-email" class="subscription__label">Email address</label>
                        <input type="email" id="subscription-email" name="email" 
                              class="subscription__input" placeholder="youremail@example.com" required>
                      </div>

                      <div class="subscription__group">
                        <label for="subscription-name" class="subscription__label">Name</label>
                        <input type="text" id="subscription-name" name="name" 
                              class="subscription__input" placeholder="Your name" required>
                      </div>
                    </div>

                    <div class="subscription__info">
                      <div class="subscription__group">
                        <label for="card-type">Card Type:</label>
                        <select id="card-type" name="card-type" required>
                          <option value="">Select a card</option>
                          <option value="visa-debit">Visa Debit</option>
                          <option value="visa-credit">Visa Credit</option>
                          <option value="mastercard">MasterCard</option>
                          <option value="amex">American Express</option>
                        </select>
                      </div>
                    
                      <div class="subscription__group">
                        <label for="card-number">Card Number:</label>
                        <input type="text" id="card-number" name="card-number" maxlength="16" 
                              placeholder="1234 5678 9012 3456" required>
                      </div>

                      <div class="subscription__group">
                        <label for="card-name">Name on Card:</label>
                        <input type="text" id="card-name" name="card-name" 
                              placeholder="John Doe" required>
                      </div>

                      <div class="subscription__group">
                        <label for="expiration">Expiration Date:</label>
                        <input type="month" id="expiration" name="expiration" 
                              placeholder="MM/YYYY" required>
                      </div>

                      <div class="subscription__group">
                        <label for="cvv">Security Code (CVV):</label>
                        <input type="text" id="cvv" name="cvv" maxlength="4" 
                              placeholder="123" required>
                      </div>
                    
                    </div>

                    
                  </form> 
                </div>
                <div class="modal-footer">
                  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                  <button type="submit" class="btn btn-primary" form="subscription-form">Subscribe!</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Code Here -->
      </nav>
    </header>

    <div class="root__principal">
      <div class="root__principal__slider-container">
        <!-- Code Here Slider-->

        <!-- Code Here -->
      </div>
      <main class="root__principal__main">
        <!-- Code Here Blog Content -->

        <!-- Code Here -->
      </main>
      <aside class="root__aside">
        <!-- Code Here Aside Content -->

        <!-- Code Here -->
      </aside>
    </div>
    
    <footer class="root__footer">
      <!-- Code Here Footer -->
      <!-- Footer is the same in all pages -->

      <!-- Code Here -->
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
